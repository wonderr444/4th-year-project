<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4th Year Representatives</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            color: #667eea;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .home-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .representatives-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .representative-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: auto;
            min-width: 350px;
            max-width: 500px;
        }

        .representative-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .photo-container {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 0;
            overflow: hidden;
            border: 4px solid #667eea;
            background: #f0f0f0;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
        }

        .section {
            font-size: 0.95rem;
            color: #667eea;
            font-weight: 600;
            padding: 6px 18px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .pagination a {
            background: white;
            color: #667eea;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .pagination a:hover,
        .pagination a.active {
            background: #667eea;
            color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 30px;
            }

            .home-btn {
                top: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 0.9rem;
            }

            .representatives-container {
                gap: 20px;
            }

            .representative-card {
                flex-direction: column;
                text-align: center;
                padding: 20px;
                min-width: 100%;
                max-width: 400px;
                width: 100%;
            }

            .photo-container {
                width: 100px;
                height: 100px;
            }

            .info {
                align-items: center;
            }

            .name {
                font-size: 1.1rem;
            }

            .section {
                font-size: 0.85rem;
            }

            .pagination {
                flex-wrap: wrap;
                gap: 8px;
            }

            .pagination a {
                padding: 8px 14px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .photo-container {
                width: 80px;
                height: 80px;
            }

            .name {
                font-size: 1rem;
            }

            .section {
                font-size: 0.8rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
    <a href="#" class="home-btn">🏠 Home</a>
    
    <h1>4th Year Representatives</h1>
    
    <div class="representatives-container">
        <div class="representative-card">
            <div class="photo-container">
                <img src="https://imgur.com/a/jRCPKmZ" alt="description of image">
            </div>
            <div class="info">
                <div class="name">Francis Paul Arquesa</div>
                <div class="section">BSIS 4A</div>
            </div>
        </div>

        <div class="representative-card">
            <div class="photo-container">
               <img src="images/leomar.jpg" alt="Representative Photo">
            </div>
            <div class="info">
                <div class="name">Leomar B. Alejandro</div>
                <div class="section">BSIS 4B</div>
            </div>
        </div>

        <div class="representative-card">
            <div class="photo-container">
                <img src="images/noel.jpg" alt="Representative Photo">
            </div>
            <div class="info">
                <div class="name">Noel V. Dorin Jr.</div>
                <div class="section">BSIS 4C</div>
            </div>
        </div>
    </div>
    
    <div class="pagination">
        <a href="#" class="active">1</a>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">Next &raquo;</a>
    </div>
</body>
</html>
